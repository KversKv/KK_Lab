<h2>VT6002 Thermal Chamber（温箱）</h2>
<h3>页面介绍</h3>
<p>Thermal Chamber 页面用于控制 VT6002 温箱设备，实现温度环境的精确控制，配合其他测试实现高低温测试。</p>

<h3>测试项</h3>
<ul>
  <li><b>温度设置</b> — 设定目标温度值</li>
  <li><b>温度监控</b> — 实时显示温箱当前温度（圆形温度表盘）</li>
  <li><b>温度到达检测</b> — 判断当前温度是否已到达目标温度</li>
</ul>

<h3>测试方法</h3>
<ol>
  <li>选择串口并连接 VT6002 温箱</li>
  <li>设置目标温度值</li>
  <li>点击启动，温箱开始加热/制冷</li>
  <li>观察温度表盘，等待温度到达目标值后进行后续测试</li>
</ol>
