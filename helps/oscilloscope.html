<h2>Oscilloscope（示波器）</h2>
<h3>页面介绍</h3>
<p>Oscilloscope 页面用于控制示波器（支持 Tektronix MSO64B 和 Keysight DSOX4034A），进行信号波形采集与分析。</p>

<h3>测试项</h3>
<ul>
  <li><b>波形采集</b> — 采集示波器各通道的波形数据</li>
  <li><b>通道配置</b> — 设置各通道的探头衰减、耦合方式、垂直刻度等</li>
  <li><b>触发设置</b> — 配置触发源、触发电平和触发模式</li>
  <li><b>截图功能</b> — 获取示波器屏幕截图</li>
</ul>

<h3>测试方法</h3>
<ol>
  <li>搜索并连接可用的示波器设备（VISA 地址）</li>
  <li>配置需要使用的通道参数</li>
  <li>设置合适的触发条件</li>
  <li>执行采集并查看波形结果</li>
</ol>
