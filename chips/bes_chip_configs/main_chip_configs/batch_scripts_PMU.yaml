DCDC_CONFIG:
- //Vcore/Vana/Vhppa burst enable
- WRITE_BITS 0x131 12 12 0x1
- WRITE_BITS 0x141 12 12 0x1
- WRITE_BITS 0x151 12 12 0x1

- //Vcore/Vana/Vhppa is_gain_sel=0
- WRITE_BITS 0x13A 15 15 0x0
- WRITE_BITS 0x14A 15 15 0x0
- WRITE_BITS 0x15A 15 15 0x0

- //Vcore/Vana/Vhppa reserved[0]=1
- WRITE_BITS 0x138 8 8 0x1
- WRITE_BITS 0x148 8 8 0x1
- WRITE_BITS 0x158 8 8 0x1

- //opt_currentref_aon_b=0
- WRITE_BITS 0x12F 2 2 0x0

- //dcdc_buck_i_halve=1 
- WRITE_BITS 0x12F 0 0 0x1



sleep_config:
- // DCDC CONFIG 3.1uA
- // lp_mode rtc 3.3uA
- WRITE_BITS 0x006A 6 5 0x3
- // rtc voltage 0.7V  2uA
- WRITE_BITS 0x012A 5 5 0x1
- WRITE_BITS 0x012B 7 4 0xA
- // rtc override   3uA
- WRITE_BITS 0x00D2 1 1 0x1
- WRITE_BITS 0x012B 7 4 0x6

