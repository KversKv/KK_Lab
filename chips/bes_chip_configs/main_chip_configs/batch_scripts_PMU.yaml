# 批处理脚本配置文件
# 最后更新: 从 新建 文本文档.txt 导入
DefaultReadWrite:
  - // 示例 从地址0x40读取（请替换为PMU模块的实际地址)
  - READ 0x40
  - DELAY 100
  - // 示例 向地址0x41写入0xABCD（请替换地址和数据）
  - WRITE 0x41 0xABCD
  - READ 0x41

efuse_page1_write_3:
  - // reg_efuse_clk_osc_sel
  - WRITE_BITS 0x00BF 14 14 0x1
  - // reg_efuse_clk_en
  - WRITE_BITS 0xB7 3 3 0x1
  - // reg_efuse_pgm_mode
  - WRITE_BITS 0xB7 0 0 0x1
  - // reg_efuse_turn_on
  - WRITE_BITS 0xB7 4 4 0x1
  - // page1
  - WRITE_BITS 0xB7 9 6 0x1
  - // bit0
  - WRITE_BITS 0xB7 14 10 0x0
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x1
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x0
  - // h bit0
  - WRITE_BITS 0xB7 14 10 0x10
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x1
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x0
  - // bit1
  - WRITE_BITS 0xB7 14 10 0x1
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x1
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x0
  - // bit1
  - WRITE_BITS 0xB7 14 10 0x11
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x1
  - // reg_efuse_strobe_trigger
  - WRITE_BITS 0xB7 5 5 0x0
  - // reg_efuse_turn_on
  - WRITE_BITS 0xB7 4 4 0x0
  - // reg_efuse_clk_en
  - WRITE_BITS 0xB7 3 3 0x0
  - // reg_efuse_pgm_mode
  - WRITE_BITS 0xB7 1 1 0x0



