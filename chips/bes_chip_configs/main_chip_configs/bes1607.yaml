voltage_low:
- // 示例:降低所有电压轨
- WRITE_BITS 0x0130 10 10 0x1
- WRITE_BITS 0x0140 10 10 0x1
- WRITE_BITS 0x0150 10 10 0x1
voltage_default:
- // 示例:恢复默认电压
- WRITE_BITS 0x0130 10 10 0x0
- WRITE_BITS 0x0140 10 10 0x0
- WRITE_BITS 0x0150 10 10 0x0
Vcore:
- '- //1806p buck_vcore'
- '- ''1806p_PMU: WRITE 0x0046 0x0f0f'''
VcoreM:
- '- //1806p buck_vcore'
- '- ''1806p_PMU: WRITE 0x0046 0x0f0f'''
VcoreL: []
VANA:
- '- //1806p buck_vana'
- '- ''1806p_PMU: WRITE 0x0047 0x0f0f'''
VHPPA:
- '- //1806p buck_vhppa=1.7V'
- '- ''1806p_PMU: WRITE 0x01e6 0x220f'''
